<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sc-grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C3BE2" />
      <stop offset="100%" stop-color="#0EA5E9" />
    </linearGradient>
    <linearGradient id="sc-grad2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9" />
      <stop offset="100%" stop-color="#6C3BE2" />
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#6C3BE2" flood-opacity="0.2" />
    </filter>
  </defs>

  <g filter="url(#glow)" transform="translate(10, 0)">
    <!-- A perfectly rolled typographical "S" -->
    <path d="M 230 170
             C 230 110, 200 80, 150 80
             C 90 80, 70 110, 70 160
             C 70 210, 110 230, 150 240
             C 190 250, 240 280, 240 340
             C 240 400, 190 420, 150 420
             C 90 420, 60 380, 60 320" 
          stroke="url(#sc-grad1)" 
          fill="none" 
          stroke-width="56" 
          stroke-linecap="round" />

    <!-- A perfectly matched typographical "C" -->
    <path d="M 430 170
             C 430 110, 400 80, 350 80
             C 300 80, 260 156, 260 250
             C 260 344, 300 420, 350 420
             C 400 420, 430 390, 430 330" 
          stroke="url(#sc-grad2)" 
          fill="none" 
          stroke-width="56" 
          stroke-linecap="round" />
  </g>
</svg>
